<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - HandsOn</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-layout">
    <aside class="sidebar">
        <div class="user-profile">
            <div class="avatar"></div>
            <p>Student Name</p>
        </div>
        <nav class="side-nav">
            <a href="#">Curriculum</a>
            <a href="#">Activity Log</a>
        </nav>
    </aside>

    <main class="content">
        <section class="practice-area">
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas"></canvas>
                <div id="feedback-overlay">Position your hands in the frame...</div>
            </div>
        </section>

        <section class="analytics">
            <div class="card" id="mastery-score-card">
                <h3>Mastery Score</h3>
                <h1 id="score-display">0%</h1>
            </div>
            <div class="card" id="module-progress">
                <h3>Module 1: Alphabet</h3>
                <div class="progress-bar-container">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Load Logic Scripts -->
    <script src="js/progress.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
